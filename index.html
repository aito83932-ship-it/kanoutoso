<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>はたらき方診断</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f7fa; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 400px; width: 90%; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .progress { color: #888; font-size: 14px; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; font-size: 14px; }
        .meta { display: flex; justify-content: space-around; margin: 20px 0; font-size: 12px; color: #999; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .btn { display: inline-block; background: #000; color: #fff; text-decoration: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔨 はたらき方診断</h1>
        <div class="progress">0 / 10</div>
        <h3>今の仕事、このままでいい？</h3>
        <p>業種・経験関係なし。10問の「あるある」に答えるだけで、あなたに合う現場の仕事タイプがわかります。</p>
        <div class="meta">
            <span>⏱ 全10問</span>
            <span>⏳ 約2分</span>
            <span>💼 業種不問</span>
        </div>
        <a href="#" class="btn">診断スタート →</a>
    </div>
</body>
</html>
